extensions:
  opamp:
    server:
      ws:
        endpoint: ws://otel-magnify:4320/v1/opamp
        # For servers started with OPAMP_SHARED_SECRET, uncomment:
        # headers:
        #   Authorization: "Bearer ${env:OPAMP_SHARED_SECRET}"
        tls:
          insecure: true


receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 5s

exporters:
  debug:
    verbosity: basic

service:
  extensions: [opamp]
  telemetry:
    resource:
      service.name: user-api
      service.version: 2.1.0
      deployment.environment: staging
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
