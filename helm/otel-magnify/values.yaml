replicaCount: 1

image:
  repository: ghcr.io/magnify-labs/otel-magnify
  # Defaults to .Chart.AppVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  apiPort: 8080
  opampPort: 4320

ingress:
  enabled: false
  className: ""
  hosts:
    - host: otel-magnify.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

config:
  dbDriver: pgx
  dbDSN: ""
  corsOrigins: ""

jwtSecret: ""

# UID/GID 10001 matches the non-root user created in the Dockerfile.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# The binary does not call the Kubernetes API.
automountServiceAccountToken: false

# Storage for the data directory (SQLite DB, runtime state). emptyDir is
# ephemeral; set persistence.existingClaim to bind a pre-created PVC for
# durable storage.
persistence:
  enabled: false
  existingClaim: ""

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi
