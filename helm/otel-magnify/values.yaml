replicaCount: 1

deployment:
  # Increment after rotating an operator-managed Secret.
  secretRevision: ""

image:
  repository: ghcr.io/magnify-labs/otel-magnify
  # Defaults to .Chart.AppVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  apiPort: 8080
  opampPort: 4320

ingress:
  enabled: false
  className: ""
  hosts:
    - host: otel-magnify.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

database:
  # Use an operator-managed Secret instead of rendering database.dsn into the
  # release Secret. The Secret must contain the key in existingSecretKey.
  existingSecret: ""
  existingSecretKey: db-dsn
  # Set only when Helm should create the release Secret with this DSN.
  dsn: ""
  maxOpenConns: 40
  maxIdleConns: 10
  connMaxIdleTimeSeconds: 300
  connMaxLifetimeSeconds: 1800

config:
  corsOrigins: ""

# Reference an operator-managed Secret for the durable JWT signing key.
# The documented installation path uses this instead of inline values.
auth:
  existingSecret: ""
  jwtSecretKey: jwt-secret
  seedAdmin:
    enabled: false
    # Keep bootstrap credentials in a separate, removable Secret.
    existingSecret: ""
    emailKey: seed-admin-email
    passwordKey: seed-admin-password

# Legacy inline fallback. Prefer auth.existingSecret for new installations.
jwtSecret: ""
# Optional OpAMP bearer token. Leave empty only for local/trusted runs; set for
# production, shared, or exposed OpAMP boundaries and configure agents to send
# the same Authorization bearer value.
opampSharedSecret: ""

# UID/GID 10001 matches the non-root user created in the Dockerfile.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# The binary does not call the Kubernetes API.
automountServiceAccountToken: false

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi
