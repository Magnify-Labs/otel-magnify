apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: otel-magnify
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: api
              containerPort: 8080
            - name: opamp
              containerPort: 4320
          env:
            - name: DB_DRIVER
              value: {{ .Values.config.dbDriver | quote }}
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: db-dsn
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: jwt-secret
            - name: LISTEN_ADDR
              value: ":8080"
            - name: OPAMP_ADDR
              value: ":4320"
            - name: CORS_ORIGINS
              value: {{ .Values.config.corsOrigins | quote }}
            {{- with .Values.config.validatorBinaryPath }}
            - name: BINARY_OTELCOL
              value: {{ . | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /healthz
              port: api
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: api
            initialDelaySeconds: 3
      volumes:
        - name: data
          {{- if and .Values.persistence.enabled .Values.persistence.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
