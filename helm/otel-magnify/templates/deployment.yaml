apiVersion: apps/v1
kind: Deployment
{{- if not (or .Values.database.existingSecret .Values.database.dsn) }}
{{- fail "set database.existingSecret or database.dsn to provide DB_DSN" }}
{{- end }}
{{- $jwtSecret := required "set jwtSecret to provide JWT_SECRET" .Values.jwtSecret }}
{{- $databaseSecretName := .Values.database.existingSecret | default (printf "%s-secret" .Release.Name) }}
{{- $databaseSecretKey := .Values.database.existingSecretKey }}
{{- if not .Values.database.existingSecret }}
{{- $databaseSecretKey = "db-dsn" }}
{{- end }}
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: otel-magnify
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: api
              containerPort: 8080
            - name: opamp
              containerPort: 4320
          env:
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ $databaseSecretName }}
                  key: {{ $databaseSecretKey | quote }}
            - name: DB_MAX_OPEN_CONNS
              value: {{ .Values.database.maxOpenConns | quote }}
            - name: DB_MAX_IDLE_CONNS
              value: {{ .Values.database.maxIdleConns | quote }}
            - name: DB_CONN_MAX_LIFETIME_SECONDS
              value: {{ .Values.database.connMaxLifetimeSeconds | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: jwt-secret
            - name: LISTEN_ADDR
              value: ":8080"
            - name: OPAMP_ADDR
              value: ":4320"
            - name: OPAMP_SHARED_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: opamp-shared-secret
            - name: CORS_ORIGINS
              value: {{ .Values.config.corsOrigins | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /healthz
              port: api
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: api
            initialDelaySeconds: 3
      volumes:
        - name: tmp
          emptyDir: {}
