{{- $replicaCountKind := kindOf .Values.replicaCount }}
{{- $replicaCountIsNumeric := or (eq $replicaCountKind "float64") (eq $replicaCountKind "int64") }}
{{- if not (and $replicaCountIsNumeric (eq (printf "%v" .Values.replicaCount) "1")) }}
{{- fail "replicaCount must remain 1 because OpAMP connections are process-local" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
{{- if not (or .Values.database.existingSecret .Values.database.dsn) }}
{{- fail "set database.existingSecret or database.dsn to provide DB_DSN" }}
{{- end }}
{{- if not (or .Values.auth.existingSecret .Values.jwtSecret) }}
{{- fail "set auth.existingSecret or jwtSecret to provide JWT_SECRET" }}
{{- end }}
{{- if and .Values.auth.seedAdmin.enabled (not .Values.auth.seedAdmin.existingSecret) }}
{{- fail "set auth.seedAdmin.existingSecret when auth.seedAdmin.enabled=true" }}
{{- end }}
{{- $databaseSecretName := .Values.database.existingSecret | default (printf "%s-secret" .Release.Name) }}
{{- $databaseSecretKey := .Values.database.existingSecretKey }}
{{- if not .Values.database.existingSecret }}
{{- $databaseSecretKey = "db-dsn" }}
{{- end }}
{{- $authSecretName := .Values.auth.existingSecret | default (printf "%s-secret" .Release.Name) }}
{{- $jwtSecretKey := .Values.auth.jwtSecretKey }}
{{- if not .Values.auth.existingSecret }}
{{- $jwtSecretKey = "jwt-secret" }}
{{- end }}
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
      annotations:
        checksum/release-secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.deployment.secretRevision }}
        otel-magnify.io/secret-revision: {{ . | quote }}
        {{- end }}
    spec:
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: otel-magnify
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: api
              containerPort: 8080
            - name: opamp
              containerPort: 4320
          env:
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ $databaseSecretName }}
                  key: {{ $databaseSecretKey | quote }}
            - name: DB_MAX_OPEN_CONNS
              value: {{ .Values.database.maxOpenConns | quote }}
            - name: DB_MAX_IDLE_CONNS
              value: {{ .Values.database.maxIdleConns | quote }}
            - name: DB_CONN_MAX_IDLE_TIME_SECONDS
              value: {{ .Values.database.connMaxIdleTimeSeconds | quote }}
            - name: DB_CONN_MAX_LIFETIME_SECONDS
              value: {{ .Values.database.connMaxLifetimeSeconds | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $authSecretName }}
                  key: {{ $jwtSecretKey | quote }}
            {{- if .Values.auth.seedAdmin.enabled }}
            - name: SEED_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.seedAdmin.existingSecret }}
                  key: {{ .Values.auth.seedAdmin.emailKey | quote }}
            - name: SEED_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.seedAdmin.existingSecret }}
                  key: {{ .Values.auth.seedAdmin.passwordKey | quote }}
            {{- end }}
            - name: LISTEN_ADDR
              value: ":8080"
            - name: OPAMP_ADDR
              value: ":4320"
            - name: OPAMP_SHARED_SECRET
              {{- if .Values.opampSharedSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: opamp-shared-secret
              {{- else }}
              value: ""
              {{- end }}
            - name: CORS_ORIGINS
              value: {{ .Values.config.corsOrigins | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /healthz
              port: api
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 1
          startupProbe:
            httpGet:
              path: /healthz
              port: api
            periodSeconds: 5
            failureThreshold: 60
            timeoutSeconds: 1
          readinessProbe:
            httpGet:
              path: /readyz
              port: api
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 1
      volumes:
        - name: tmp
          emptyDir: {}
