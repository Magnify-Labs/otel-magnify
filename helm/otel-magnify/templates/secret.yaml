{{- if or .Values.jwtSecret .Values.opampSharedSecret (and .Values.database.dsn (not .Values.database.existingSecret)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secret
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  jwt-secret: {{ .Values.jwtSecret | quote }}
  opamp-shared-secret: {{ .Values.opampSharedSecret | quote }}
  {{- if and .Values.database.dsn (not .Values.database.existingSecret) }}
  db-dsn: {{ .Values.database.dsn | quote }}
  {{- end }}
{{- end }}
