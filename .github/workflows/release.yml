name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image_digest:
        description: Digest of the already-published image to scan and sign
        required: true
        type: string
      release_tag:
        description: Existing GitHub release tag to receive the SBOMs
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-image:
    name: Build + push multi-arch image
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # push to ghcr.io
      id-token: write          # provenance via OIDC
      attestations: write      # build provenance attestation
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.event.release.tag_name }}

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/otel-magnify
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  verify-release-artifact:
    name: Verify release artifact
    needs: build-image
    if: >-
      always() &&
      (github.event_name == 'workflow_dispatch' || needs.build-image.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      image_digest: ${{ steps.artifact.outputs.image_digest }}
      release_tag: ${{ steps.artifact.outputs.release_tag }}
    steps:
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve and verify release artifact
        id: artifact
        env:
          BUILT_DIGEST: ${{ needs.build-image.outputs.digest }}
          INPUT_DIGEST: ${{ inputs.image_digest }}
          RELEASE_TAG: ${{ inputs.release_tag || github.event.release.tag_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          image_digest="${BUILT_DIGEST:-$INPUT_DIGEST}"
          release_tag="${RELEASE_TAG:-}"

          [[ "$image_digest" =~ ^sha256:[a-f0-9]{64}$ ]]
          [[ "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          gh release view "$release_tag" --repo "$GITHUB_REPOSITORY"

          image_tag="${release_tag#v}"
          published_digest="$(docker buildx imagetools inspect \
            "ghcr.io/magnify-labs/otel-magnify:${image_tag}" \
            --format '{{.Manifest.Digest}}')"
          test "$published_digest" = "$image_digest"

          echo "image_digest=$image_digest" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

  trivy-gate:
    name: Trivy CRITICAL gate on built image
    needs: verify-release-artifact
    if: always() && needs.verify-release-artifact.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read           # pull image from ghcr.io
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/magnify-labs/otel-magnify@${{ needs.verify-release-artifact.outputs.image_digest }}
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: .trivyignore

  sbom-and-sign:
    name: SBOM + cosign sign
    needs: [verify-release-artifact, trivy-gate]
    if: >-
      always() &&
      needs.verify-release-artifact.result == 'success' &&
      needs.trivy-gate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write          # upload SBOMs to the GitHub Release
      packages: write          # cosign sign the image in ghcr.io
      id-token: write          # cosign keyless OIDC
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Generate SBOM (SPDX)
        env:
          IMAGE_REF: ghcr.io/magnify-labs/otel-magnify@${{ needs.verify-release-artifact.outputs.image_digest }}
        run: |
          syft "$IMAGE_REF" -o spdx-json=otel-magnify.spdx.json

      - name: Generate SBOM (CycloneDX)
        env:
          IMAGE_REF: ghcr.io/magnify-labs/otel-magnify@${{ needs.verify-release-artifact.outputs.image_digest }}
        run: |
          syft "$IMAGE_REF" -o cyclonedx-json=otel-magnify.cyclonedx.json

      - name: Sign image (cosign keyless)
        env:
          IMAGE_REF: ghcr.io/magnify-labs/otel-magnify@${{ needs.verify-release-artifact.outputs.image_digest }}
        run: |
          cosign sign --yes "$IMAGE_REF"

      # Buildx publishes an SBOM attestation through `sbom: true`; attaching
      # the Syft documents below makes the same SBOM formats available from
      # the GitHub release without a second, incompatible attestation format.

      - name: Attach SBOMs to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.verify-release-artifact.outputs.release_tag }}
        run: |
          gh release upload "$TAG" \
            otel-magnify.spdx.json \
            otel-magnify.cyclonedx.json \
            --clobber
