name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test-go:
    name: Go build + test (Go 1.25)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # We intentionally use the `golang:1.25` minor tag (not a digest pin) so
      # that Docker Hub patches (1.25.x) are picked up automatically. The minor
      # tag is bounded — it will never drift to 1.26. Renovate could pin the
      # digest with auto-bump if we want stricter posture later.
      - name: Build & test in golang:1.25 container
        run: |
          docker run --rm \
            -v "$PWD:/app" \
            -w /app \
            -e GOFLAGS='-mod=mod -buildvcs=false' \
            golang:1.25 sh -c 'go build ./... && go test -race ./...'

  build-frontend:
    name: Frontend build + lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  test-e2e-frontend:
    name: Playwright e2e (frontend, mocked API)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      # Cache the downloaded browser binaries keyed on the Playwright version
      # pinned in package-lock.json. When the cache hits we skip the browser
      # download but still run --with-deps once to make sure OS-level shared
      # libs are present on the runner image (fast, no network needed).
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers (+ OS deps)
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e suite (mocked API, no backend dependency)
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
