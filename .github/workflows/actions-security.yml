name: actions-security

on:
  pull_request:
    paths: ['.github/workflows/**']
  push:
    branches: [main]
    paths: ['.github/workflows/**']
  schedule:
    - cron: '17 5 * * 1'   # Mon 05:17 UTC — safety net hebdo
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: actions-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint (workflow lint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write           # reviewdog reporter=github-pr-check pousse via Check Runs API
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          fail_level: error
          reporter: github-pr-check

  zizmor:
    name: zizmor (workflow security audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run zizmor (SARIF — feeds Security tab, exit code is always 0)
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo:ro" \
            ghcr.io/zizmorcore/zizmor@sha256:128ebbe369a95f9d4427737e794537256095b55f779a247aebc960dc4ea1f7b3 \
            --format=sarif --persona=regular /repo/.github/workflows > zizmor.sarif
      - name: Run zizmor (GitHub annotations — propagates exit code, fails the job on findings)
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo:ro" \
            ghcr.io/zizmorcore/zizmor@sha256:128ebbe369a95f9d4427737e794537256095b55f779a247aebc960dc4ea1f7b3 \
            --format=github --persona=regular /repo/.github/workflows
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@65216971a11ded447a6b76263d5a144519e5eee1 # codeql-bundle-v2.25.2
        with:
          sarif_file: zizmor.sarif
          category: zizmor
        continue-on-error: true   # no-op silencieux côté EE (pas de GHAS)

  pinact:
    name: pinact (SHA-pinning check)
    runs-on: ubuntu-latest
    # Pas de continue-on-error : enforce dès J1 (baseline déjà clean côté community).
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.12'
      - name: Install pinact
        # pinact >=v3.9.2 requires Go >=1.26.2; setup-go@v6 sets GOTOOLCHAIN=local
        # by default (v5 left it auto), so we override here to let Go fetch the
        # required toolchain on the fly without bumping the repo-wide go.mod.
        env:
          GOTOOLCHAIN: auto
        run: go install github.com/suzuki-shunsuke/pinact/v3/cmd/pinact@v3.9.2
      - name: pinact check (SARIF)
        # `pinact run --check` fail si une action n'est pas pinnée au SHA.
        # On capture le SARIF *avant* que la step échoue grâce à `set -o pipefail` + tee.
        run: |
          set -o pipefail
          pinact run --check --format=sarif | tee pinact.sarif
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@65216971a11ded447a6b76263d5a144519e5eee1 # codeql-bundle-v2.25.2
        with:
          sarif_file: pinact.sarif
          category: pinact
        continue-on-error: true   # no-op silencieux côté EE
