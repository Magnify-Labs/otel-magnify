name: security-pr

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  secrets:
    name: gitleaks (secrets)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      # gitleaks/gitleaks-action v2 requires a paid license for organisations.
      # We run the open-source binary via the official Docker image instead.
      - name: gitleaks (Docker)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo:ro" \
            zricethezav/gitleaks:v8.30.1 \
            detect --source=/repo --config=/repo/.gitleaks.toml --no-banner --redact -v

  lint-go:
    name: golangci-lint (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25'
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2
          args: --timeout=5m

  lint-fe:
    name: ESLint + Prettier (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  vulns-go:
    name: govulncheck (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25'
      # govulncheck is the canonical Go vuln scanner — does call-graph analysis
      # so it only flags vulnerabilities reachable from our code. We previously
      # also ran osv-scanner here, but it does naive dependency scanning and
      # produced noise on non-reachable CVEs (e.g. pgx GHSA-j88v-2chj-qfwx).
      # osv-scanner stays in vulns-fe for npm where no call-graph tool exists.
      - name: govulncheck
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          go-version-input: '1.25'
          go-package: ./...

  vulns-fe:
    name: osv-scanner (npm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: osv-scanner (frontend)
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v1.9.2
        with:
          scan-args: |-
            --lockfile=frontend/package-lock.json

  docker-lint:
    name: hadolint (Dockerfile)
    runs-on: ubuntu-latest
    continue-on-error: true # warning, pas bloquant
    permissions:
      contents: read
      security-events: write   # upload SARIF
    strategy:
      matrix:
        dockerfile: ['Dockerfile', 'cmd/sdkagent/Dockerfile']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          config: .hadolint.yaml
          format: sarif
          output-file: hadolint-${{ strategy.job-index }}.sarif
          no-fail: true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@65216971a11ded447a6b76263d5a144519e5eee1 # codeql-bundle-v2.25.2
        if: always()
        with:
          sarif_file: hadolint-${{ strategy.job-index }}.sarif
          category: hadolint-${{ strategy.job-index }}

  iac:
    name: trivy config + checkov (IaC)
    runs-on: ubuntu-latest
    continue-on-error: true # warning
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: trivy config scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          exit-code: '0'
      - name: Upload trivy SARIF
        uses: github/codeql-action/upload-sarif@65216971a11ded447a6b76263d5a144519e5eee1 # codeql-bundle-v2.25.2
        if: always()
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config
      - name: checkov (Helm)
        uses: bridgecrewio/checkov-action@4048c972aae68d0b983a48bb3479aab2d877b898 # v12.3102.0
        with:
          directory: helm/
          framework: helm
          config_file: .checkov.yml
          output_format: sarif
          output_file_path: checkov.sarif
          soft_fail: true
      - name: Upload checkov SARIF
        uses: github/codeql-action/upload-sarif@65216971a11ded447a6b76263d5a144519e5eee1 # codeql-bundle-v2.25.2
        if: always()
        with:
          sarif_file: checkov.sarif/results_sarif.sarif
          category: checkov-helm

  licenses:
    name: license check (Go + npm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25'
      - name: Install go-licenses
        run: go install github.com/google/go-licenses@latest
      - name: Check Go licenses
        env:
          GOFLAGS: '-mod=mod -buildvcs=false'
        run: |
          set -euo pipefail
          allowed=$(grep -v '^#' licenses.allowlist.txt | grep -v '^$' | grep -v 'AND' | paste -sd, -)
          go-licenses check --allowed_licenses="${allowed}" \
            --ignore=modernc.org/mathutil \
            ./...
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Check npm licenses
        run: |
          set -euo pipefail
          cd frontend
          npm ci
          # license-checker --onlyAllow takes a semicolon-separated list.
          # Composite SPDX expressions ("MIT AND ISC") are passed through verbatim.
          allowed=$(grep -v '^#' ../licenses.allowlist.txt | grep -v '^$' | paste -sd';' -)
          npx --yes license-checker --production --onlyAllow "${allowed}" \
            --excludePackages 'frontend@0.4.0'
