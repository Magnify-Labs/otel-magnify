services:
  otel-magnify:
    image: ${OTEL_MAGNIFY_IMAGE:-otel-magnify:local}
    build: .
    ports:
      - "8080:8080"
      - "4320:4320"
    environment:
      DB_DSN: ${DB_DSN:-postgres://magnify:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set to a strong PostgreSQL password}@postgres:5432/magnify?sslmode=disable}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set to a strong random value of at least 32 characters}
      LISTEN_ADDR: ":8080"
      OPAMP_ADDR: ":4320"
      OPAMP_SHARED_SECRET: ${OPAMP_SHARED_SECRET:-}
      CORS_ORIGINS: "http://localhost:8080"
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      MIN_AGENT_VERSION: ${MIN_AGENT_VERSION:-}
    depends_on:
      postgres:
        condition: service_healthy

  activation-agent:
    profiles: [activation]
    image: otel-magnify-activation-agent:local
    build:
      context: .
      dockerfile: cmd/sdkagent/Dockerfile
    command:
      - --endpoint
      - ws://otel-magnify:4320/v1/opamp
      - --name
      - otelcol-activation-demo
      - --version
      - 0.1.0
      - --env
      - activation
      - --accept-remote-config
    depends_on:
      otel-magnify:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: magnify
      POSTGRES_USER: magnify
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set to a strong PostgreSQL password}
      PGDATA: /var/lib/postgresql/18/docker
    ports:
      - "5432:5432"
    volumes:
      - pg18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U magnify -d magnify"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg18-data:
