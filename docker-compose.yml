services:
  otel-magnify:
    build: .
    ports:
      - "8080:8080"
      - "4320:4320"
    environment:
      DB_DSN: ${DB_DSN:-postgres://magnify:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set to a strong PostgreSQL password}@postgres:5432/magnify?sslmode=disable}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set to a strong random value of at least 32 characters}
      LISTEN_ADDR: ":8080"
      OPAMP_ADDR: ":4320"
      OPAMP_SHARED_SECRET: ${OPAMP_SHARED_SECRET:-}
      CORS_ORIGINS: "http://localhost:8080"
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      MIN_AGENT_VERSION: ${MIN_AGENT_VERSION:-}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: magnify
      POSTGRES_USER: magnify
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set to a strong PostgreSQL password}
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U magnify -d magnify"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg-data:
