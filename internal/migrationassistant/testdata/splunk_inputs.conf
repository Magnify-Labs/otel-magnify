[monitor:///var/log/app.log]
disabled = 0
sourcetype = app:json
index = main
host = checkout-host

[monitor:///var/log/disabled.log]
disabled = 1

[httpout]
uri = https://splunk.example:8088
token = splunk-red-fixture-token

[source::/var/log/app.log]
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3N%z
LINE_BREAKER = ([\r\n]+)
