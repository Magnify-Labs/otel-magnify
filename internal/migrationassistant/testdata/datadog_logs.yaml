api_key: dd-red-fixture-secret
site: datadoghq.eu
env: prod
tags:
  - team:payments
logs_config:
  container_collect_all: true
logs:
  - type: file
    path: /var/log/app.log
    service: checkout
    source: go
    log_processing_rules:
      - type: mask_sequences
        name: scrub-card
        pattern: "card=(\\d+)"
apm_config:
  enabled: true
